    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.22) 0%,
          rgba(0, 0, 0, 0.46) 100%
        );
      pointer-events: none;
    }

    body.light::before {
      opacity: 0.46;
      filter: saturate(0.62) contrast(0.88) brightness(1.08);
    }

    body.light::after {
      background: rgba(242, 242, 247, 0.72);
    }

    body.light {
      --bg: #f2f2f7;
      --fg: #111111;
      --muted: #6e6e73;
      --accent: #111111;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding:
        max(18px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      touch-action: manipulation;
    }

    .clock-wrap {
      text-align: center;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.42);
      transform: translate(var(--shift-x), var(--shift-y));
      transition: transform 900ms ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .time {
      display: flex;
      align-items: baseline;
      justify-content: center;
      letter-spacing: -0.055em;
      line-height: 0.9;
      font-variant-numeric: tabular-nums;
      font-weight: 650;
      white-space: nowrap;
    }

    #hm {
      font-size: clamp(84px, 25vw, 240px);
    }

    #seconds {
      margin-left: 0.10em;
      font-size: clamp(30px, 7.5vw, 72px);
      color: var(--muted);
      letter-spacing: -0.03em;
    }

    .date {
      margin-top: clamp(12px, 3vh, 28px);
      font-size: clamp(20px, 4.5vw, 42px);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .zone {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(13px, 2.4vw, 20px);
      letter-spacing: 0.12em;
    }

    .controls {
      position: fixed;
      z-index: 2;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(40, 40, 40, 0.72);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    body.light .clock-wrap {
      text-shadow: 0 2px 14px rgba(255, 255, 255, 0.62);
    }

    body.light .controls {
      background: rgba(255, 255, 255, 0.78);
    }

    .controls.visible {
      opacity: 1;
      pointer-events: auto;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 11px;
      padding: 10px 13px;
      background: rgba(255, 255, 255, 0.16);
      color: var(--fg);
      font: inherit;
      font-size: 14px;
      white-space: nowrap;
    }

    body.light button {
      background: rgba(0, 0, 0, 0.08);
    }

    .hint {
      position: fixed;
      z-index: 2;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 12px;
      opacity: 0.75;
      white-space: nowrap;
      transition: opacity 500ms ease;
    }

    .hint.hidden {
      opacity: 0;
    }

    @media (orientation: portrait) {
      #hm {
        font-size: clamp(76px, 28vw, 180px);
      }
      #seconds {
        font-size: clamp(28px, 8vw, 52px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .clock-wrap {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main id="app" aria-label="卓上時計">
    <section class="clock-wrap">
      <div class="time" aria-live="off">
        <span id="hm">00:00</span>
        <span id="seconds">00</span>
      </div>
      <div id="date" class="date">----</div>
      <div class="zone">JAPAN STANDARD TIME</div>
    </section>
  </main>

  <div id="hint" class="hint">画面をタップすると設定を表示</div>

  <nav id="controls" class="controls" aria-label="時計設定">
    <button id="secondsBtn" type="button">秒を隠す</button>
    <button id="themeBtn" type="button">白背景</button>
    <button id="wakeBtn" type="button">画面固定</button>
  </nav>

  <script>
    (() => {
      const hm = document.getElementById("hm");
      const seconds = document.getElementById("seconds");
      const dateEl = document.getElementById("date");
      const controls = document.getElementById("controls");
      const hint = document.getElementById("hint");
      const secondsBtn = document.getElementById("secondsBtn");
      const themeBtn = document.getElementById("themeBtn");
      const wakeBtn = document.getElementById("wakeBtn");

      let showSeconds = localStorage.getItem("showSeconds") !== "false";
      let isLight = localStorage.getItem("theme") === "light";
      let hideTimer = null;
      let wakeLock = null;

      const pad = n => String(n).padStart(2, "0");
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];

      function applyPrefs() {
        seconds.style.display = showSeconds ? "inline" : "none";
        secondsBtn.textContent = showSeconds ? "秒を隠す" : "秒を表示";
        document.body.classList.toggle("light", isLight);
        themeBtn.textContent = isLight ? "黒背景" : "白背景";
      }

      function updateClock() {
        const now = new Date();
        hm.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
        seconds.textContent = pad(now.getSeconds());
        dateEl.textContent =
          `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日（${weekdays[now.getDay()]}）`;

        const delay = 1000 - now.getMilliseconds();
        window.setTimeout(updateClock, delay);
      }

      function shiftForBurnIn() {
        const x = Math.round((Math.random() - 0.5) * 12);
        const y = Math.round((Math.random() - 0.5) * 8);
        document.documentElement.style.setProperty("--shift-x", `${x}px`);
        document.documentElement.style.setProperty("--shift-y", `${y}px`);
      }

      function showControls() {
        controls.classList.add("visible");
        hint.classList.add("hidden");
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => controls.classList.remove("visible"), 5000);
      }

      async function requestWakeLock() {
        if (!("wakeLock" in navigator)) {
          wakeBtn.textContent = "設定で自動ロック解除";
          return;
        }
        try {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeBtn.textContent = "画面固定中";
          wakeLock.addEventListener("release", () => {
            wakeBtn.textContent = "画面固定";
          });
        } catch (error) {
          wakeBtn.textContent = "固定できません";
        }
      }

      document.getElementById("app").addEventListener("click", showControls);

      secondsBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        showSeconds = !showSeconds;
        localStorage.setItem("showSeconds", String(showSeconds));
        applyPrefs();
        showControls();
      });

      themeBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        isLight = !isLight;
        localStorage.setItem("theme", isLight ? "light" : "dark");
        applyPrefs();
        showControls();
      });

      wakeBtn.addEventListener("click", async (event) => {
        event.stopPropagation();
        await requestWakeLock();
        showControls();
      });

      document.addEventListener("visibilitychange", async () => {
        if (document.visibilityState === "visible" && wakeLock !== null) {
          await requestWakeLock();
        }
      });

      applyPrefs();
      updateClock();
      shiftForBurnIn();
      setInterval(shiftForBurnIn, 60000);
      setTimeout(() => hint.classList.add("hidden"), 4500);
    })();
  </script>
</body>
</html>
